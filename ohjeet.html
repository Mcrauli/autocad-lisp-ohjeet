<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Radika LISP ohjeet</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  display: flex;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: #e2e8f0;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #020617; }
::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: #334155; }

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: rgba(2,6,23,0.9);
  backdrop-filter: blur(10px);
  padding: 32px 0;
  position: fixed;
  height: 100vh;
  border-right: 1px solid rgba(255,255,255,0.04);
}

.title {
  padding: 0 26px;
  font-weight: 700;
  font-size: 17px;
  color: #facc15;
  margin-bottom: 32px;
}

.menu a {
  display: block;
  padding: 14px 26px;
  text-decoration: none;
  color: #94a3b8;
  transition: 0.25s;
}

.menu a:hover {
  color: #e2e8f0;
  background: rgba(255,255,255,0.03);
  transform: translateX(3px);
  box-shadow: inset 2px 0 0 #facc15;
}

.menu a.active {
  color: #facc15;
  background: rgba(255,255,255,0.05);
  font-weight: 600;
}

/* CONTENT */
.content {
  margin-left: 260px;
  width: 100%;
  display: flex;
  justify-content: center;
  padding: 140px 24px;
}

.wrapper {
  max-width: 680px;
  width: 100%;
}

/* SECTION */
.section {
  margin-bottom: 240px;
  position: relative;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.6s ease;
}

.section.visible {
  opacity: 1;
  transform: translateY(0);
}

/* DIVIDER */
.section::before {
  content: "";
  position: absolute;
  top: -120px;
  left: 0;
  width: 100%;
  height: 2px;
  background: linear-gradient(to right, transparent, rgba(255,255,255,0.15), transparent);
}

.section:first-child::before {
  display: none;
}

/* TITLE */
h1 {
  font-size: 38px;
  margin-bottom: 80px;
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* CATEGORY */
.category {
  font-size: 22px;
  font-weight: 600;
  padding: 14px 18px;
  background: linear-gradient(90deg, rgba(30,41,59,0.7), rgba(2,6,23,0.6));
  border-left: 4px solid #facc15;
  border-radius: 8px;
  margin-top: 90px;
  margin-bottom: 45px;
  position: relative;
}

.category::before {
  content: "";
  position: absolute;
  top: -25px;
  left: 0;
  width: 60px;
  height: 2px;
  background: #facc15;
  opacity: 0.6;
}

/* BLOCK */
.block {
  background: rgba(2,6,23,0.75);
  padding: 18px;
  border-radius: 10px;
  margin-top: 22px;
  border: 1px solid rgba(255,255,255,0.05);
  transition: 0.25s;
}

.block:hover {
  transform: translateY(-2px);
  background: rgba(15,23,42,0.85);
}

/* TEXT */
p {
  line-height: 1.85;
  color: #cbd5f5;
  margin-bottom: 16px;
}

/* LIST */
ul, ol {
  margin-left: 20px;
  margin-top: 10px;
  line-height: 1.75;
}

li {
  margin-bottom: 8px;
}

/* CODE */
code {
  background: #1e293b;
  padding: 4px 7px;
  border-radius: 5px;
  color: #facc15;
}

/* TOP NAV */
.topnav {
  position: fixed;
  top: 0;
  left: 260px;
  right: 0;
  height: 60px;
  background: rgba(2,6,23,0.9);
  display: flex;
  align-items: center;
  padding: 0 30px;
  gap: 30px;
  z-index: 1000;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.topnav a {
  color: #94a3b8;
  text-decoration: none;
  font-weight: 500;
}

.topnav a:hover {
  color: #facc15;
}
</style>
</head>
